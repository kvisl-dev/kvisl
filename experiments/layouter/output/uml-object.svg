  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">One placed order — object diagram</text><text x="65" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">alice: Customer</text><path d="M 53 162.45 H 301.75" stroke="#26364a" stroke-width="1"/><text x="65" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">id = C-1042</text><text x="65" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">email = alice@example.test</text><text x="426.15" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">order4711: Order</text><path d="M 414.15 162.45 H 662.9" stroke="#26364a" stroke-width="1"/><text x="426.15" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">number = 4711</text><text x="426.15" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status = paid</text><text x="779.9" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">line1: LineItem</text><path d="M 767.9 162.45 H 1016.65" stroke="#26364a" stroke-width="1"/><text x="779.9" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">quantity = 2</text><text x="779.9" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">unitPrice = 19.90 EUR</text><text x="1148.45" y="164.325" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">payment1: CreditCardPayment</text><path d="M 1136.45 172.575 H 1385.2" stroke="#26364a" stroke-width="1"/><text x="1148.45" y="188.575" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">authorized = true</text><g><rect x="331.75" y="141.575" width="52.400000000000006" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="357.95" y="156.575" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155">orders</text></g><g><rect x="692.9" y="133.5125" width="45" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="715.4" y="148.5125" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155">items</text></g><g><rect x="1067.2649999999999" y="149.6375" width="59.800000000000004" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1097.165" y="164.6375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155">payment</text></g></g>
