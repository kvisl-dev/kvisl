  <g id="ports"></g>
  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">One placed order — object diagram</text><text x="65" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">alice: Customer</text><path d="M 53 162.45 H 301.75" stroke="#26364a" stroke-width="1"/><text x="65" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">id = C-1042</text><text x="65" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">email = alice@example.test</text><text x="371.75" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">order4711: Order</text><path d="M 359.75 162.45 H 608.5" stroke="#26364a" stroke-width="1"/><text x="371.75" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">number = 4711</text><text x="371.75" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status = paid</text><text x="690.5" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">line1: LineItem</text><path d="M 678.5 162.45 H 927.25" stroke="#26364a" stroke-width="1"/><text x="690.5" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">quantity = 2</text><text x="690.5" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">unitPrice = 19.90 EUR</text><text x="997.25" y="164.325" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">payment1: CreditCardPayment</text><path d="M 985.25 172.575 H 1234" stroke="#26364a" stroke-width="1"/><text x="997.25" y="188.575" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">authorized = true</text><g data-line-label="alice-order"><text x="330.75" y="91.57499999999999" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">orders</text></g><g data-line-label="order-line"><text x="643.5" y="148.5125" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">items</text></g><g data-line-label="order-payment"><text x="629.5" y="241.6375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">payment</text></g></g>
