  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">One placed order — object diagram</text><text x="65" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">alice: Customer</text><path d="M 53 162.45 H 301.75" stroke="#26364a" stroke-width="1"/><text x="65" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">id = C-1042</text><text x="65" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">email = alice@example.test</text><text x="379.75" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">order4711: Order</text><path d="M 367.75 162.45 H 616.5" stroke="#26364a" stroke-width="1"/><text x="379.75" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">number = 4711</text><text x="379.75" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status = paid</text><text x="698.5" y="154.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450" text-decoration="underline">line1: LineItem</text><path d="M 686.5 162.45 H 935.25" stroke="#26364a" stroke-width="1"/><text x="698.5" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">quantity = 2</text><text x="698.5" y="198.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">unitPrice