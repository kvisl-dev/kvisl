><g data-line="fork-system-call"><polyline points="398.8142857142857,334.8 398.8142857142857,415.8 297.03214285714284,415.8 36,415.8 36,523.05 195.25,523.05 195.25,537.05" fill="none" stroke="#ea580c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 189.25 525.05 L 195.25 537.05 L 201.25 525.05" fill="none" stroke="#ea580c" stroke-width="2" stroke-linejoin="round"/></g><g data-line="resume-parent"><polyline points="949.625,537.05 949.625,427.8 644,427.8 644,380.8 550.25,380.8 550.25,334.8" fill="none" stroke="#7048e8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><path d="M 556.25 346.8 L 550.25 334.8 L 544.25 346.8" fill="none" stroke="#7048e8" stroke-width="2" stroke-linejoin="round"/></g></g>
