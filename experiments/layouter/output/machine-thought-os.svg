  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">An operating system for machine thought</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">The thinking model requests parallelism. The inference engine decides when it runs.</text><text x="65" y="193.5" text-anchor="start" fill="#cae5fb" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">THINKING MODEL · USER MODE</text><text x="184" y="250.75" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent completion</text><text x="184" y="271" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">shared history</text><text x="450" y="250.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Parallel&gt;</text><text x="450" y="271" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">system call: fork</text><text x="692" y="250.75" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Parent resumes</text><text x="692" y="271" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;Conclusion&gt;</text><text x="65" y="428.25" text-anchor="start" fill="#4b5563" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">SGLANG · INFERENCE ENGINE / KERNEL</text><text x="195.25" y="521.5" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Interpreter</text><text x="195.25" y="541.75" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">creates child</text><text x="195.25" y="562" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">requests</text><text x="458.5" y="521.5" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">TAPER scheduler</text><text x="458.5" y="541.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">admit per forward</text><text x="458.5" y="562" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="613.5" y="514.5" text-anchor="start" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">NEXT GPU FORWARD PASS</text><text x="780.5" y="571.75" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child A</text><text x="780.5" y="592" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="780.5" y="660.25" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child B</text><text x="780.5" y="680.5" text-anchor="middle" fill="#2a9d45" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">running</text><text x="774.5" y="770.75" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Child C</text><text x="774.5" y="791" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ready, deferred this</text><text x="774.5" y="811.25" text-anchor="middle" fill="#ea580c" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pass</text><text x="1090.5" y="521.5" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">wait()</text><text x="1090.5" y="541.75" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">join KV views</text><text x="195.25" y="630.25" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Shared prefix KV blocks</text><text x="195.25" y="650.5" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">+ small branch-local state</text><text x="774.5" y="461.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">continuous batching · radix KV cache</text><text x="637.25" y="972" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Model chooses the work graph. Engine chooses</text><text x="637.25" y="992.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">the schedule.</text></g>
