  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Order lifecycle — state-machine diagram</text><text x="478.25" y="158.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Draft</text><text x="478.25" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">entry / create basket</text><text x="785.25" y="158.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Submitted</text><text x="785.25" y="178.45" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">entry / freeze prices</text><text x="65" y="259.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Processing</text><text x="65" y="279.95" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">do / coordinate payment and inventory</text><text x="103" y="439.325" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Authorizing payment</text><text x="103" y="569.825" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Reserving inventory</text><text x="478.25" y="274.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Fulfilled</text><text x="478.25" y="294.95" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">entry / emit OrderFulfilled</text><text x="785.25" y="274.7" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Cancelled</text><text x="785.25" y="294.95" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">entry / release reservations</text><g data-line-label="authorizing-reserving"><text x="178.5" y="504.70000000000005" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">authorized</text></g><g data-line-label="reserving-complete"><text x="179.9" y="635.2" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">reserved</text></g><g data-line-label="submit"><text x="756.25" y="102.40833333333333" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">submit</text></g><g data-line-label="submit"><text x="756.25" y="54.40833333333333" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">[basket not empty]</text></g><g data-line-label="process"><text x="507.875" y="350.2" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">paymentRequested</text></g><g data-line-label="fulfil"><text x="342.66041666666666" y="656.2" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">processingComplete</text></g><g data-line-label="cancel-submitted"><text x="875.55" y="226.7" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">cancel</text></g><g data-line-label="cancel-processing"><text x="595.75" y="471.45000000000005" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">cancel</text></g></g>
