  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical</text><text x="52" y="163.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="217.8" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="125.125" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="125.125" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="578.5833333333334" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="578.5833333333334" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="922.4583333333334" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="922.4583333333334" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1305.375" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Forward to worker Pod</text><text x="1305.375" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">IP:80</text><text x="65" y="440.55" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes cluster: capacity, templates, controllers, worker Pods</text><text x="87" y="526.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes API layer</text><text x="217.25" y="618.175" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">WorkerPool CRD</text><text x="217.25" y="638.425" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">replicas + ateom image</text><text x="217.25" y="728.8" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ActorTemplate CRD</text><text x="217.25" y="749.05" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">containers + workerPoolRef</text><text x="217.25" y="769.3" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">snapshot + runsc config</text><text x="429.5" y="526.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Substrate control plane</text><text x="716.5" y="608.05" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateapi</text><text x="716.5" y="628.3" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gRPC API</text><text x="475.5" y="713.55" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Valkey / Redis — actor +</text><text x="475.5" y="733.8" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">worker truth</text><text x="597.5" y="791.05" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor:&lt;id&gt;</text><text x="597.5" y="811.3" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status + snapshot refs</text><text x="835.5" y="791.05" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker:&lt;ns&gt;:&lt;pool&gt;:&lt;pod&gt;</text><text x="835.5" y="811.3" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">free / busy</text><text x="429.5" y="1006.55" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Snapshot storage — GCS / S3-style</text><text x="429.5" y="1026.8" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">object storage</text><text x="601" y="1084.05" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">checkpoint.img.zstd</text><text x="601" y="1104.3" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pages.img.zstd + pages_meta.img.zstd</text><text x="1077.5" y="526.8" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Worker node / runtime layer</text><text x="1349.5" y="584.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atelet DaemonSet</text><text x="1349.5" y="604.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">node supervisor</text><text x="1159.5" y="701.55" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod — label:</text><text x="1159.5" y="721.8" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">ate.dev/worker-pool</text><text x="1361.5" y="779.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1361.5" y="799.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1229.5" y="884.55" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox —</text><text x="1229.5" y="904.8" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">create / start ·</text><text x="1229.5" y="925.05" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">checkpoint / restore</text><text x="1305.375" y="982.3" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1305.375" y="1002.55" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1349.5" y="1126.8" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1349.5" y="1147.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1349.5" y="1167.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="229.25" y="851.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="229.25" y="871.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1249.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1269.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1290.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1453.5" y="1249.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1453.5" y="1269.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1453.5" y="1290.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g><rect x="812" y="573.3"