nt-size="15" font-weight="700">Valkey / Redis — actor +</text><text x="459.5" y="693.5" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">worker truth</text><text x="581.5" y="750.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor:&lt;id&gt;</text><text x="581.5" y="771" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status + snapshot refs</text><text x="819.5" y="750.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker:&lt;ns&gt;:&lt;pool&gt;:&lt;pod&gt;</text><text x="819.5" y="771" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">free / busy</text><text x="421.5" y="888.25" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Snapshot storage — GCS /</text><text x="421.5" y="908.5" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">S3-style object storage</text><text x="700.5" y="965.75" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">checkpoint.img.zstd</text><text x="700.5" y="986" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pages.img.zstd + pages_meta.img.zstd</text><text x="1171.5" y="494.5" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Worker node / runtime layer</text><text x="1306.5" y="567.75" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atelet DaemonSet</text><text x="1306.5" y="588" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">node supervisor</text><text x="1568.3" y="560.75" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod —</text><text x="1568.3" y="581" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">label:</text><text x="1568.3" y="601.25" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">ate.dev/worker-pool</text><text x="1733.3" y="658.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1733.3" y="678.75" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1606.3" y="764" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox —</text><text x="1606.3" y="784.25" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">create / start ·</text><text x="1606.3" y="804.5" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">checkpoint / restore</text><text x="1741.3" y="861.75" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1741.3" y="882" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1733.3" y="1006.25" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1733.3" y="1026.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1733.3" y="1046.75" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="225.25" y="811.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="225.25" y="831.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1129" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1149.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1169.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1816.3" y="1129" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1816.3" y="1149.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1816.3" y="1169.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g data-line-label="resume-actor"><text x="1075.5" y="559.2916666666667" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">ResumeActor(actorID)</text></g><g data-line-label="self-suspend"><text x="1486" y="859" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">self-suspend</text></g><g data-line-label="self-suspend" transform="rotate(90 1054.5 725.5)"><text x="1054.5" y="722.5" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">api.ate-system.svc.cluster.local:443</text><text x="1054.5" y="738.5" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">SuspendActor(actorID)</text></g><g data-line-label="checkpoint-transfer"><text x="1075.5" y="947" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">restore download</text><text x="1075.5" y="963" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">checkpoint upload</text></g><g data-line-label="worker-pool-controller"><text x="224.25" y="448" text-anchor="start" font-family="ui-rounded, sans-serif" font-size="13" fill="#7d8794" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">WorkerPool controller maintains warm persistent worker Pods</text></g></g>
