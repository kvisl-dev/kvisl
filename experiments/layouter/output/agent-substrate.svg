  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical</text><text x="52" y="163.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="217.8" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="125.125" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="125.125" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="419.5" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="419.5" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="763.375" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="763.375" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1703.5" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight=