  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical</text><text x="52" y="163.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="217.8" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="125.125" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="125.125" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="419.5" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="419.5" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="763.375" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="763.375" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1020.625" y="275.05" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Forward to worker Pod</text><text x="1020.625" y="295.3" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">IP:80</text><text x="65" y="452.55" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes cluster: capacity, templates, controllers, worker Pods</text><text x="87" y="550.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes API layer</text><text x="217.25" y="618.175" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">WorkerPool CRD</text><text x="217.25" y="638.425" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">replicas + ateom image</text><text x="217.25" y="728.8" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ActorTemplate CRD</text><text x="217.25" y="749.05" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">containers + workerPoolRef</text><text x="217.25" y="769.3" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">snapshot + runsc config</text><text x="441.5" y="550.8" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Substrate control plane</text><text x="728.5" y="632.05" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateapi</text><text x="728.5" y="652.3" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gRPC API</text><text x="487.5" y="737.55" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Valkey / Redis — actor + worker truth</text><text x="609.5" y="794.8" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor:&lt;id&gt;</text><text x="609.5" y="815.05" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status + snapshot refs</text><text x="847.5" y="794.8" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker:&lt;ns&gt;:&lt;pool&gt;:&lt;pod&gt;</text><text x="847.5" y="815.05" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">free / busy</text><text x="441.5" y="960.3" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Snapshot storage — GCS / S3-style object storage</text><text x="613" y="1017.55" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">checkpoint.img.zstd</text><text x="613" y="1037.8" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pages.img.zstd + pages_meta.img.zstd</text><text x="1101.5" y="550.8" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Worker node / runtime layer</text><text x="1500.25" y="632.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atelet DaemonSet</text><text x="1500.25" y="652.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">node supervisor</text><text x="1183.5" y="749.55" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod — label: ate.dev/worker-pool</text><text x="1518.25" y="842.8" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1518.25" y="863.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1241.5" y="948.3" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox — create / start · checkpoint / restore</text><text x="1317.375" y="1029.55" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1317.375" y="1049.8" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1500.25" y="1174.05" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1500.25" y="1194.3" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1500.25" y="1214.55" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="235.25" y="851.55" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="235.25" y="871.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1296.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1317.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1337.3" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1707" y="1296.8" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1707" y="1317.05" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1707" y="1337.3" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g><rect x="1019.875" y="609.3" width="156" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1097.875" y="624.3" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">ResumeActor(actorID)</text></g><g><rect x="794.0999999999999" y="842.175" width="274.40000000000003" height="36" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="931.3" y="857.175" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">api.ate-system.svc.cluster.local:443</text><text x="931.3" y="873.175" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df">SuspendActor(actorID) · self-suspend</text></g><g><rect x="935.1" y="971.7375" width="133.8" height="36" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="1002" y="986.7375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8">restore download</text><text x="1002" y="1002.7375" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8">checkpoint upload</text></g><g><rect x="464.575" y="438.55" width="444.6" height="20" rx="4" fill="#ffffff" fill-opacity=".9"/><text x="686.875" y="453.55" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7d8794">WorkerPool controller maintains warm persistent worker Pods</text></g></g>
