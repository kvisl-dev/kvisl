  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Agent Substrate component design</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Micro-scheduler above Kubernetes: persistent worker Pods, logical actors, gVisor/runsc checkpoint/restore, Valkey runtime state.</text><text x="65" y="193.5" text-anchor="start" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Ingress / request path</text><text x="184" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Client /</text><text x="184" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">framework</text><text x="731.9166666666666" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Host:</text><text x="731.9166666666666" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">&lt;actor&gt;.actors.resources.substrate.ate.dev</text><text x="1279.8333333333333" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atenet / Envoy router</text><text x="1279.8333333333333" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ext_proc handler</text><text x="1750.5" y="250.75" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Forward to worker Pod</text><text x="1750.5" y="271" text-anchor="middle" fill="#079a72" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">IP:80</text><text x="65" y="416.25" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes cluster: capacity, templates, controllers, worker Pods</text><text x="87" y="502.5" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Kubernetes API layer</text><text x="217.25" y="593.875" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">WorkerPool CRD</text><text x="217.25" y="614.125" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">replicas + ateom image</text><text x="217.25" y="704.5" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ActorTemplate CRD</text><text x="217.25" y="724.75" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">containers + workerPoolRef</text><text x="217.25" y="745" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">snapshot + runsc config</text><text x="429.5" y="502.5" text-anchor="start" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Substrate control plane</text><text x="716.5" y="583.75" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateapi</text><text x="716.5" y="604" text-anchor="middle" fill="#1683df" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">gRPC API</text><text x="475.5" y="689.25" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Valkey / Redis — actor +</text><text x="475.5" y="709.5" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">worker truth</text><text x="597.5" y="766.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor:&lt;id&gt;</text><text x="597.5" y="787" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">status + snapshot refs</text><text x="835.5" y="766.75" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker:&lt;ns&gt;:&lt;pool&gt;:&lt;pod&gt;</text><text x="835.5" y="787" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">free / busy</text><text x="429.5" y="942.25" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Snapshot storage — GCS / S3-style</text><text x="429.5" y="962.5" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">object storage</text><text x="601" y="1019.75" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">checkpoint.img.zstd</text><text x="601" y="1040" text-anchor="middle" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">pages.img.zstd + pages_meta.img.zstd</text><text x="1089.5" y="502.5" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Worker node / runtime layer</text><text x="1244.5" y="583.75" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">atelet DaemonSet</text><text x="1244.5" y="604" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">node supervisor</text><text x="1435.5" y="576.75" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Persistent Worker Pod — label:</text><text x="1435.5" y="597" text-anchor="start" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">ate.dev/worker-pool</text><text x="1624.5" y="654.25" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">ateom-visor</text><text x="1624.5" y="674.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">runtime helper</text><text x="1493.5" y="759.75" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">gVisor / runsc sandbox —</text><text x="1493.5" y="780" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">create / start ·</text><text x="1493.5" y="800.25" text-anchor="start" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">checkpoint / restore</text><text x="1636.5" y="857.5" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Agent</text><text x="1636.5" y="877.75" text-anchor="middle" fill="#e5a000" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">process</text><text x="1618.5" y="1002" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Warm free worker Pods</text><text x="1618.5" y="1022.25" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">waiting for actor</text><text x="1618.5" y="1042.5" text-anchor="middle" fill="#f97316" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">assignment</text><text x="229.25" y="827.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">No per-actor Kubernetes object on the hot</text><text x="229.25" y="847.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">path.</text><text x="247.125" y="1148.75" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Hot path avoids one Kubernetes object per</text><text x="247.125" y="1169" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">actor. Kubernetes provisions capacity;</text><text x="247.125" y="1189.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Substrate schedules logical actors.</text><text x="1715.5" y="1148.75" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Security-sensitive boundary: privileged</text><text x="1715.5" y="1169" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">worker machinery outside; agent workload</text><text x="1715.5" y="1189.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">inside gVisor/runsc sandbox.</text><g data-line-label="resume-actor"><text x="941.5" y="570.2916666666667" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">ResumeActor(actorID)</text></g><g data-line-label="self-suspend"><text x="1354.5" y="849.75" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">self-suspend</text></g><g data-line-label="self-suspend"><text x="919.3" y="887" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">api.ate-system.svc.cluster.local:443</text><text x="919.3" y="903" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#1683df" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">SuspendActor(actorID)</text></g><g data-line-label="checkpoint-transfer"><text x="952.5" y="996" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">restore download</text><text x="952.5" y="1012" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7048e8" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">checkpoint upload</text></g><g data-line-label="worker-pool-controller"><text x="957.5" y="455.5" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#7d8794" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">WorkerPool controller maintains warm persistent worker Pods</text></g></g>
