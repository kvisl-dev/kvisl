  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">Vegvísir — one voice, multiple agents</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">A voice-first road companion that stays responsive while deeper work happens in the background</text><text x="162" y="281.125" text-anchor="middle" fill="#ea7600" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Driver</text><text x="162" y="367.25" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">speaks · listens</text><text x="162" y="575.5" text-anchor="middle" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Vegvísir</text><text x="357" y="193.5" text-anchor="start" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Vegvísir on iPhone</text><text x="647.625" y="250.75" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Realtime Voice Agent</text><text x="647.625" y="271" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">GPT-Realtime-2 → GPT-Live</text><text x="647.625" y="291.25" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">listens · speaks · delegates</text><text x="647.625" y="311.5" text-anchor="middle" fill="#1674c8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Fast conversational loop — never blocked by long-running work</text><text x="647.625" y="439.75" text-anchor="middle" fill="#ea7600" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Speak</text><text x="647.625" y="460" text-anchor="middle" fill="#ea7600" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">now?</text><text x="647.625" y="588.25" text-anchor="middle" fill="#21a044" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Road Agent Harness</text><text x="647.625" y="608.5" text-anchor="middle" fill="#21a044" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Drive context · async Road Tasks · ranking</text><text x="647.625" y="628.75" text-anchor="middle" fill="#21a044" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">POI search · map state · navigation handoff</text><text x="503.25" y="745" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Local Markdown context</text><text x="503.25" y="765.25" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Soul · Preferences · Today</text><text x="503.25" y="785.5" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">· Memory</text><text x="777.75" y="745" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Live road knowledge</text><text x="777.75" y="765.25" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">MapKit · Overpass ·</text><text x="777.75" y="785.5" text-anchor="middle" fill="#7d8794" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Wikipedia</text><text x="1036.25" y="213.375" text-anchor="start" fill="#7048e8" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">User-owned agents</text