33" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">Cancelled</text><text x="819.65" y="298.95" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">entry / release reservations</text><g data-line-label="authorizing-reserving"><text x="193.625" y="516.1" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">authorized</text></g><g data-line-label="reserving-complete"><text x="195.025" y="646.6" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">reserved</text></g><g data-line-label="submit"><text x="775.45" y="204.40833333333333" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">submit</text></g><g data-line-label="submit"><text x="775.45" y="78.40833333333333" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">[basket not empty]</text></g><g data-line-label="process"><text x="532.6375" y="84.2" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">paymentRequested</text></g><g data-line-label="fulfil"><text x="354.16979166666664" y="660.2" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">processingComplete</text></