  <g id="text"><text x="52" y="84" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="32" font-weight="700">One evaluated model, renderer-neutral stages</text><text x="52" y="139.2" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="18" font-weight="450">Semantic identity survives selection, solving, and every painter.</text><text x="162" y="314.5" text-anchor="middle" fill="#7c3aed" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">TSX + components</text><text x="438" y="314.5" text-anchor="middle" fill="#0284c7" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Logical IR</text><text x="714" y="314.5" text-anchor="middle" fill="#0284c7" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Projection IR</text><text x="990" y="314.5" text-anchor="middle" fill="#0284c7" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Solved IR</text><text x="1193" y="193.5" text-anchor="start" fill="#172033" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="700">painters</text><text x="1328" y="256.625" text-anchor="middle" fill="#16a34a" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Excalidraw</text><text x="1328" y="328.625" text-anchor="middle" fill="#16a34a" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">SVG</text><text x="1328" y="400.625" text-anchor="middle" fill="#16a34a" font-family="ui-rounded, 'Comic Sans MS', sans-serif" font-size="15" font-weight="450">Canvas</text><g data-line-label="$line-1"><text x="300" y="271.625" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">normalize</text></g><g data-line-label="$line-2"><text x="576" y="271.625" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">materialize</text></g><g data-line-label="$line-3"><text x="852" y="271.625" text-anchor="middle" font-family="ui-rounded, sans-serif" font-size="13" fill="#334155" stroke="#ffffff" stroke-opacity=".92" stroke-width="3.5" stroke-linejoin="round" paint-order="stroke fill">layout + route</text></g></g>
