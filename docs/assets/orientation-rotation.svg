<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">One component, embedded upright and rotated 90 degrees</title>
  <desc id="desc">The same pipeline component appears twice: authored as a left-to-right row, and embedded in a container with orientation 90 where it renders top-to-bottom. Text stays upright in both.</desc>
  <defs>
    <marker id="orArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2878c8"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font-size: 15px; }
      .label { font-size: 17px; font-weight: 600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
      .muted { fill: #5f6b7c; }
      .scope { fill: #ffffff; stroke: #7b8798; stroke-width: 2; }
      .node { fill: #eef5ff; stroke: #2878c8; stroke-width: 2.5; }
      .flow { fill: none; stroke: #2878c8; stroke-width: 3.5; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="518" rx="22" fill="#f8fafc" stroke="#d8dee8" stroke-width="2"/>
  <text x="40" y="42" class="label">Local frames: the same component in two orientations</text>

  <!-- upright: authored as a row -->
  <rect x="40" y="90" width="640" height="180" rx="18" class="scope"/>
  <text x="64" y="122" class="label">upright</text>
  <text x="64" y="146" class="mono muted">&lt;Pipeline id="upright" /&gt;</text>

  <rect x="80" y="170" width="150" height="64" rx="14" class="node"/>
  <text x="155" y="208" text-anchor="middle" class="label">Ingest</text>
  <rect x="285" y="170" width="150" height="64" rx="14" class="node"/>
  <text x="360" y="208" text-anchor="middle" class="label">Transform</text>
  <rect x="490" y="170" width="150" height="64" rx="14" class="node"/>
  <text x="565" y="208" text-anchor="middle" class="label">Publish</text>
  <path d="M 230 202 L 285 202" class="flow" marker-end="url(#orArrow)"/>
  <path d="M 435 202 L 490 202" class="flow" marker-end="url(#orArrow)"/>

  <!-- rotated: same declarations, container orientation 90 -->
  <rect x="800" y="90" width="360" height="400" rx="18" class="scope"/>
  <text x="824" y="122" class="label">rotated</text>
  <text x="824" y="146" class="mono muted">&lt;Scope orientation={90}&gt;</text>
  <text x="838" y="166" class="mono muted">&lt;Pipeline id="pipeline" /&gt;</text>

  <rect x="905" y="186" width="150" height="64" rx="14" class="node"/>
  <text x="980" y="224" text-anchor="middle" class="label">Ingest</text>
  <rect x="905" y="298" width="150" height="64" rx="14" class="node"/>
  <text x="980" y="336" text-anchor="middle" class="label">Transform</text>
  <rect x="905" y="410" width="150" height="64" rx="14" class="node"/>
  <text x="980" y="448" text-anchor="middle" class="label">Publish</text>
  <path d="M 980 250 L 980 298" class="flow" marker-end="url(#orArrow)"/>
  <path d="M 980 362 L 980 410" class="flow" marker-end="url(#orArrow)"/>

  <!-- rotation hint -->
  <path d="M 700 175 A 46 46 0 0 1 748 220" fill="none" stroke="#e8833a" stroke-width="4" stroke-linecap="round" marker-end="url(#orRot)"/>
  <defs>
    <marker id="orRot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8833a"/>
    </marker>
  </defs>
  <text x="724" y="160" text-anchor="middle" class="small" fill="#e8833a">90°</text>

  <text x="360" y="330" class="small muted">The component is authored once, in its own</text>
  <text x="360" y="354" class="small muted">left-to-right frame: sides, axes, and row</text>
  <text x="360" y="378" class="small muted">direction are local words.</text>
  <text x="360" y="418" class="small muted">Rotating the embedding container re-resolves</text>
  <text x="360" y="442" class="small muted">every local direction. Ports, corridors, and</text>
  <text x="360" y="466" class="small muted">routes follow. Text stays physically upright.</text>
</svg>
