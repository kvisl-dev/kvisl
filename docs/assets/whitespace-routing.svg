<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Whitespace created by layout is the routing plane</title>
  <desc id="desc">A container with three nodes in a row. The padding band inside the container edge and the gaps between siblings are highlighted as routable regions; a line travels through them without any declaration.</desc>
  <defs>
    <marker id="wsArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d4aff"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font-size: 15px; }
      .label { font-size: 17px; font-weight: 600; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; }
      .muted { fill: #5f6b7c; }
      .node { fill: #eef5ff; stroke: #2878c8; stroke-width: 2.5; }
      .region { fill: #eaf7f5; stroke: #18a999; stroke-width: 2; stroke-dasharray: 8 6; }
      .route { fill: none; stroke: #6d4aff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="518" rx="22" fill="#f8fafc" stroke="#d8dee8" stroke-width="2"/>
  <text x="40" y="42" class="label">Whitespace is the routing plane</text>

  <rect x="40" y="65" width="1120" height="380" rx="22" fill="#ffffff" stroke="#344054" stroke-width="2.5"/>
  <text x="68" y="96" class="label">system</text>

  <!-- padding band inside the container's top edge -->
  <rect x="70" y="110" width="1060" height="70" rx="12" class="region"/>
  <text x="92" y="138" class="mono">padding(system, "top")</text>

  <!-- three nodes in a row with tinted gaps -->
  <rect x="90" y="230" width="270" height="150" rx="16" class="node"/>
  <text x="225" y="312" text-anchor="middle" class="label">ingest</text>

  <rect x="380" y="212" width="110" height="196" rx="12" class="region"/>
  <text x="435" y="432" text-anchor="middle" class="mono">gap(ingest, transform)</text>

  <rect x="510" y="230" width="270" height="150" rx="16" class="node"/>
  <text x="645" y="312" text-anchor="middle" class="label">transform</text>

  <rect x="800" y="212" width="110" height="196" rx="12" class="region"/>
  <text x="855" y="432" text-anchor="middle" class="mono">gap(transform, publish)</text>

  <rect x="930" y="230" width="270" height="150" rx="16" class="node"/>
  <text x="1065" y="312" text-anchor="middle" class="label">publish</text>

  <!-- a route through top padding, no declaration needed -->
  <circle cx="225" cy="230" r="7" fill="#ffffff" stroke="#6d4aff" stroke-width="3"/>
  <circle cx="1065" cy="230" r="7" fill="#ffffff" stroke="#6d4aff" stroke-width="3"/>
  <path d="M 225 230 L 225 145 L 1065 145 L 1065 230" class="route" marker-end="url(#wsArrow)"/>
  <rect x="560" y="152" width="170" height="34" rx="17" fill="#f1edff"/>
  <text x="645" y="174" text-anchor="middle" class="small">retry stream</text>

  <!-- a route through a gap -->
  <circle cx="780" cy="305" r="7" fill="#ffffff" stroke="#6d4aff" stroke-width="3"/>
  <circle cx="930" cy="305" r="7" fill="#ffffff" stroke="#6d4aff" stroke-width="3"/>
  <path d="M 780 305 L 930 305" class="route" marker-end="url(#wsArrow)"/>

  <text x="600" y="485" text-anchor="middle" class="small muted">Every gap between siblings and every padding band is routable without declaration. Occupied regions widen, and layout reacts — like CSS margins.</text>
</svg>
