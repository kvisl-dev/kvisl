<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Order domain UML class diagram</title>
  <desc id="desc">Customer, Order, LineItem, PaymentMethod, CreditCardPayment, and PaypalPayment classes connected by associations, composition, and a shared generalization trunk.</desc>
  <defs>
    <marker id="filled-diamond" viewBox="0 0 16 12" refX="15" refY="6" markerWidth="14" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 6 L8 1 L15 6 L8 11 Z" fill="#172033"/>
    </marker>
    <marker id="hollow-triangle" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M1 1 L13 7 L1 13 Z" fill="#ffffff" stroke="#172033" stroke-width="1.5"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .title { font-size: 21px; font-weight: 600; }
      .name { font-size: 17px; font-weight: 600; }
      .feature { font-size: 14px; }
      .small { font-size: 13px; fill: #5f6b7c; }
      .class { fill: #ffffff; stroke: #344054; stroke-width: 2.2; }
      .divider { stroke: #98a2b3; stroke-width: 1.5; }
      .relation { fill: none; stroke: #344054; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="718" rx="22" fill="#f8fafc" stroke="#d8dee8" stroke-width="2"/>
  <text x="42" y="43" class="title">Order domain — class diagram</text>
  <rect x="36" y="68" width="1128" height="610" rx="18" fill="#f3f6fa" stroke="#7b8798" stroke-width="2"/>
  <text x="60" y="99" class="name">sales</text>

  <!-- Customer -->
  <rect x="70" y="145" width="255" height="210" rx="5" class="class"/>
  <line x1="70" y1="188" x2="325" y2="188" class="divider"/>
  <line x1="70" y1="267" x2="325" y2="267" class="divider"/>
  <text x="197.5" y="173" text-anchor="middle" class="name">Customer</text>
  <text x="86" y="214" class="feature">− id: CustomerId</text>
  <text x="86" y="240" class="feature">− email: Email</text>
  <text x="86" y="296" class="feature">+ placeOrder(cart): Order</text>
  <circle cx="325" cy="230" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>
  <circle cx="197" cy="355" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>

  <!-- Order -->
  <rect x="455" y="130" width="295" height="240" rx="5" class="class"/>
  <line x1="455" y1="173" x2="750" y2="173" class="divider"/>
  <line x1="455" y1="252" x2="750" y2="252" class="divider"/>
  <text x="602.5" y="158" text-anchor="middle" class="name">Order</text>
  <text x="471" y="199" class="feature">− number: OrderNumber</text>
  <text x="471" y="225" class="feature">− status: OrderStatus</text>
  <text x="471" y="281" class="feature">+ add(item, quantity)</text>
  <text x="471" y="307" class="feature">+ total(): Money</text>
  <circle cx="455" cy="230" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>
  <circle cx="602" cy="370" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>
  <circle cx="750" cy="230" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>

  <!-- PaymentMethod -->
  <rect x="870" y="145" width="235" height="130" rx="5" class="class"/>
  <line x1="870" y1="188" x2="1105" y2="188" class="divider"/>
  <text x="987.5" y="173" text-anchor="middle" class="name" font-style="italic">PaymentMethod</text>
  <text x="886" y="219" class="feature">+ authorize(): Result</text>
  <circle cx="870" cy="230" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>
  <circle cx="870" cy="255" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>

  <!-- LineItem -->
  <rect x="485" y="485" width="235" height="130" rx="5" class="class"/>
  <line x1="485" y1="528" x2="720" y2="528" class="divider"/>
  <text x="602.5" y="513" text-anchor="middle" class="name">LineItem</text>
  <text x="501" y="558" class="feature">− quantity: int</text>
  <text x="501" y="584" class="feature">− unitPrice: Money</text>
  <circle cx="602" cy="485" r="6" fill="#ffffff" stroke="#6d4aff" stroke-width="2.5"/>

  <!-- subclasses -->
  <rect x="805" y="520" width="170" height="72" rx="5" class="class"/>
  <text x="890" y="551" text-anchor="middle" class="name">CreditCard</text>
  <text x="890" y="575" text-anchor="middle" class="small">Payment</text>
  <rect x="1010" y="520" width="130" height="72" rx="5" class="class"/>
  <text x="1075" y="551" text-anchor="middle" class="name">Paypal</text>
  <text x="1075" y="575" text-anchor="middle" class="small">Payment</text>

  <!-- associations -->
  <path d="M325 230 L455 230" class="relation"/>
  <text x="340" y="215" class="small">customer 1</text>
  <text x="443" y="249" text-anchor="end" class="small">orders 0..*</text>

  <path d="M602 370 L602 485" class="relation" marker-start="url(#filled-diamond)"/>
  <text x="614" y="404" class="small">1</text>
  <text x="614" y="474" class="small">1..*</text>

  <path d="M750 230 L870 230" class="relation"/>
  <text x="810" y="214" text-anchor="middle" class="small">pays with</text>
  <text x="858" y="249" text-anchor="end" class="small">1</text>

  <path d="M197 355 L197 425 L835 425 L835 255 L870 255" class="relation"/>
  <text x="212" y="410" class="small">payment methods 0..*</text>

  <!-- shared generalization trunk -->
  <path d="M890 520 L890 455 L970 455" class="relation"/>
  <path d="M1075 520 L1075 455 L970 455" class="relation"/>
  <path d="M970 455 L970 275" class="relation" marker-end="url(#hollow-triangle)"/>
  <circle cx="970" cy="455" r="5" fill="#344054"/>
  <rect x="854" y="448" width="232" height="28" rx="14" fill="#f1edff"/>
  <text x="970" y="467" text-anchor="middle" class="small">shared generalization trunk</text>

  <text x="600" y="655" text-anchor="middle" class="small">Compartments, adorned ends, multiplicities, roles, composition, and shared inheritance geometry use the same core objects and lines.</text>
</svg>
